worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone for APIs (e.g., 10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Connection limiting zone (e.g., 20 connections per IP)
    limit_conn_zone $binary_remote_addr zone=addr_conn:10m;

    server {
        listen 80;

        # Frontend Service
        location / {
            proxy_pass http://frontend_service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Product API
        location /api/product/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn addr_conn 20;
            
            # Remove /api/product from the path before passing to backend
            rewrite ^/api/product/(.*) /$1 break;
            
            proxy_pass http://product_service:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Order API
        location /api/order/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn addr_conn 20;

            # Remove /api/order from the path before passing to backend
            rewrite ^/api/order/(.*) /$1 break;
            
            proxy_pass http://order_service:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth API
        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn addr_conn 20;

            # Remove /api/auth from the path before passing to backend
            rewrite ^/api/auth/(.*) /$1 break;

            proxy_pass http://auth_service:3003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
