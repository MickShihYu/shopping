server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Global proxy configurations
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /admin/orders {
        proxy_pass http://order_service:3002;
        proxy_set_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_set_header Pragma "no-cache";
        proxy_set_header Expires 0;
    }

    # Auth Service
    location /users {
        proxy_pass http://auth_service:3003;
    }

    # Order Service
    location /user-orders {
        rewrite ^/user-orders(.*)$ /users$1 break;
        proxy_pass http://order_service:3002;
    }

    location /shoppingCarts {
        proxy_pass http://order_service:3002;
    }

    location /orders {
        if ($http_accept ~* "text/html") {
            rewrite .* /index.html last;
        }
        proxy_pass http://order_service:3002;
    }

    location /admin {
        if ($http_accept ~* "text/html") {
            rewrite .* /index.html last;
        }
        proxy_pass http://order_service:3002;
    }

    location /explorer {
        proxy_pass http://order_service:3002;
    }

    location /ping {
        proxy_pass http://order_service:3002;
    }

    location /openapi.json {
        proxy_pass http://order_service:3002;
    }

    # Product Service
    location /products {
        proxy_pass http://product_service:3001;
    }

    location /admin/products {
        proxy_pass http://product_service:3001;
    }

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
