server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Auth Service
    location /users {
        proxy_pass http://auth_service:3003;
    }

    # Order Service
    location /user-orders {
        rewrite ^/user-orders(.*)$ /users$1 break;
        proxy_pass http://order_service:3002;
    }

    location /shoppingCarts {
        proxy_pass http://order_service:3002;
    }

    location /orders {
        proxy_pass http://order_service:3002;
    }

    location /admin {
        proxy_pass http://order_service:3002;
    }

    location /explorer {
        proxy_pass http://order_service:3002;
    }

    location /ping {
        proxy_pass http://order_service:3002;
    }

    location /openapi.json {
        proxy_pass http://order_service:3002;
    }

    # Product Service
    location /products {
        proxy_pass http://product_service:3001;
    }

    location /admin/products {
        proxy_pass http://product_service:3001;
    }

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
